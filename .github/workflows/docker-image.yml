name: docker-image

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to push to Aliyun
        required: true
        default: manual
      openclaw_version:
        description: OpenClaw version to install in the image
        required: true
        default: 2026.3.24
      push_arm64:
        description: Push arm64 image
        required: true
        type: boolean
        default: true
      push_amd64:
        description: Push amd64 image
        required: true
        type: boolean
        default: true

jobs:
  build-check:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build arm64 check image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: false
          tags: local/openclaw-gen-data:pr-arm64
          build-args: |
            OPENCLAW_VERSION=2026.3.24
          cache-from: type=gha,scope=pr-arm64
          cache-to: type=gha,mode=max,scope=pr-arm64

      - name: Build amd64 check image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          tags: local/openclaw-gen-data:pr-amd64
          build-args: |
            OPENCLAW_VERSION=2026.3.24
          cache-from: type=gha,scope=pr-amd64
          cache-to: type=gha,mode=max,scope=pr-amd64

  publish-aliyun-arm64:
    if: github.event_name == 'workflow_dispatch' && inputs.push_arm64
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Show selected branch
        shell: bash
        run: |
          echo "selected_ref=${{ github.ref }}"
          echo "selected_branch=${{ github.ref_name }}"
          git rev-parse HEAD
          git log -1 --oneline --decorate

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Aliyun Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Extract Aliyun arm64 metadata
        id: meta_aliyun_arm64
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/${{ github.event.repository.name }}
          tags: |
            type=raw,value=${{ inputs.image_tag }}-${{ github.ref_name }}-arm64

      - name: Build and push arm64 image to Aliyun
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta_aliyun_arm64.outputs.tags }}
          labels: |
            ${{ steps.meta_aliyun_arm64.outputs.labels }}
            org.opencontainers.image.revision=${{ github.sha }}
            io.openclaw.build.branch=${{ github.ref_name }}
          build-args: |
            OPENCLAW_VERSION=${{ inputs.openclaw_version }}
          cache-from: type=gha,scope=aliyun-arm64
          cache-to: type=gha,mode=max,scope=aliyun-arm64

  publish-aliyun-amd64:
    if: github.event_name == 'workflow_dispatch' && inputs.push_amd64
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Show selected branch
        shell: bash
        run: |
          echo "selected_ref=${{ github.ref }}"
          echo "selected_branch=${{ github.ref_name }}"
          git rev-parse HEAD
          git log -1 --oneline --decorate

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Aliyun Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Extract Aliyun metadata
        id: meta_aliyun
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/${{ github.event.repository.name }}
          tags: |
            type=raw,value=${{ inputs.image_tag }}-${{ github.ref_name }}-amd64

      - name: Build and push amd64 image to Aliyun
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta_aliyun.outputs.tags }}
          labels: |
            ${{ steps.meta_aliyun.outputs.labels }}
            org.opencontainers.image.revision=${{ github.sha }}
            io.openclaw.build.branch=${{ github.ref_name }}
          build-args: |
            OPENCLAW_VERSION=${{ inputs.openclaw_version }}
          cache-from: type=gha,scope=aliyun-amd64
          cache-to: type=gha,mode=max,scope=aliyun-amd64
